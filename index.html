<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK BAZAR - تەواو</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p style="margin-top: 15px; text-align: center;">چاوەڕێ بکە...</p>
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="showHomePage()">
                    <div class="logo-icon">
                        <img src="https://firebasestorage.googleapis.com/v0/b/ukbazar-15eda.firebasestorage.app/o/logo-ukbazar.png?alt=media&token=c1b2a45a-fbe0-4ac8-bc8f-26ae4fd7966c" alt="UK BAZAR">
                    </div>
                    <div class="logo-text">UK BAZAR</div>
                </div>

                <div class="flags">
                    <img src="https://firebasestorage.googleapis.com/v0/b/ukbazar-15eda.firebasestorage.app/o/uk-flag.webp?alt=media&token=83b7ce7b-db70-4d3a-9a32-f262c4773b1a" alt="UK Flag">
                    <img src="https://firebasestorage.googleapis.com/v0/b/ukbazar-15eda.firebasestorage.app/o/images.png?alt=media&token=79847612-3eed-48ef-9413-a3ae76df758b" alt="Kurdistan Flag">
                </div>

                <div class="nav-buttons">
                    <button class="btn btn-warning" onclick="showRequestModal()">
                        <i class="fas fa-clipboard-list"></i> داواکاری کاڵا
                    </button>
                    <button class="btn btn-secondary" onclick="showAddProductModal()">
                        <i class="fas fa-plus-circle"></i> کاڵا دابنێ
                    </button>
                    <button class="btn btn-primary" onclick="showDeliveryModal()">
                        <i class="fas fa-shipping-fast"></i> گەیاندنی کاڵا
                    </button>
                    <button class="cart-btn btn" onclick="showCartModal()">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="گەڕان بە کاڵا...">
                <button onclick="performSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </section>

    <section class="slider-section">
        <div class="container">
            <div class="slider-container" id="sliderContainer">
                <div class="slides-wrapper" id="slidesWrapper"></div>
                <button class="slider-arrow prev" onclick="prevSlide()">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button class="slider-arrow next" onclick="nextSlide()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="slider-dots" id="sliderDots"></div>
            </div>
        </div>
    </section>

    <section class="category-filter-section">
        <div class="container">
            <div class="category-buttons" id="categoryButtons"></div>
        </div>
    </section>

    <section class="products-section">
        <div class="container">
            <h2 class="section-title" id="productsTitle">هەموو کاڵاکان</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <section class="admin-section" id="adminPanel" style="display: none;">
        <div class="container">
            <h2 class="section-title">🔐 داشبۆردی بەڕێوەبەر</h2>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="showAdminTab('products')"><i class="fas fa-box"></i> کاڵا</button>
                <button class="admin-tab" onclick="showAdminTab('allProducts')"><i class="fas fa-boxes"></i> هەموو کاڵاکان</button>
                <button class="admin-tab" onclick="showAdminTab('requests')"><i class="fas fa-clipboard-list"></i> داواکاری</button>
                <button class="admin-tab" onclick="showAdminTab('delivery')"><i class="fas fa-shipping-fast"></i> گەیاندن</button>
                <button class="admin-tab" onclick="showAdminTab('addSlider')"><i class="fas fa-images"></i> سلایدەر</button>
                <button class="admin-tab" onclick="logout()"><i class="fas fa-sign-out-alt"></i> دەرچوون</button>
            </div>
            <div id="adminContent"></div>
        </div>
    </section>

    <div class="bottom-panel">
        <div class="container">
            <div class="bottom-nav">
                <a href="javascript:void(0)" class="bottom-nav-item active" onclick="showHomePage()">
                    <i class="fas fa-home"></i><span>ماڵەوە</span>
                </a>
                <a href="javascript:void(0)" class="bottom-nav-item" onclick="showRequestModal()">
                    <i class="fas fa-clipboard-list"></i><span>داواکاری</span>
                </a>
                <a href="javascript:void(0)" class="bottom-nav-item" onclick="showCartModal()">
                    <i class="fas fa-shopping-cart"></i><span>سەبەتە</span>
                </a>
                <a href="javascript:void(0)" class="bottom-nav-item" onclick="showAdminLogin()">
                    <i class="fas fa-user-shield"></i><span>بەڕێوەبەر</span>
                </a>
            </div>
        </div>
    </div>

    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <button class="image-modal-close" onclick="closeImageModal()"><i class="fas fa-times"></i></button>
        <img id="zoomedImage" src="" alt="Zoomed Image">
    </div>
    <div class="modal" id="fibModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('fibModal')"><i class="fas fa-times"></i></button>
            <div class="modal-header"><h2>💳 پارەدان بە FIB کوردستان</h2></div>
            <div class="fib-card" style="background: linear-gradient(135deg, #1e3a8a, #1e40af); padding: 30px; border-radius: 12px; text-align: center; color: white;">
                <p>ژمارەی حیساب</p>
                <h3 style="font-size: 2rem; letter-spacing: 2px;">7769654490</h3>
            </div>
            <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="copyFibNumber()" style="flex: 1;">کۆپی ژمارە</button>
                <button class="btn btn-secondary" onclick="contactFibWhatsApp()" style="flex: 1;">واتساپ</button>
            </div>
        </div>
    </div>

    
    <!-- Notification -->
    <div class="notification" id="notification">
        <span id="notificationMessage"></span>
    </div>

    <!-- Request Modal -->
    <div class="modal" id="requestModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('requestModal')"><i class="fas fa-times"></i></button>
            <div class="modal-header"><h2><i class="fas fa-clipboard-list"></i> داواکاری کاڵا</h2></div>
            <form id="requestForm">
                <div class="form-group">
                    <label>ناوی کاڵا</label>
                    <input type="text" id="requestItemName" placeholder="ناوی کاڵاکەی داواکراو" required>
                </div>
                <div class="form-group">
                    <label>وردەکاری</label>
                    <textarea id="requestDetails" placeholder="وردەکاری زیاتر..."></textarea>
                </div>
                <div class="form-group">
                    <label>ناوت</label>
                    <input type="text" id="requestName" placeholder="ناوی تەواو" required>
                </div>
                <div class="form-group">
                    <label>ژمارەی مۆبایل</label>
                    <input type="tel" id="requestMobile" placeholder="07xxxxxxxxx" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">ناردن <i class="fas fa-paper-plane"></i></button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('requestModal')">داخستن</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal" id="addProductModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('addProductModal')"><i class="fas fa-times"></i></button>
            <div class="modal-header"><h2><i class="fas fa-plus-circle"></i> کاڵا دابنێ</h2></div>
            <form id="addProductForm">
                <div class="form-group">
                    <label>ناوی کاڵا</label>
                    <input type="text" id="productName" placeholder="ناوی کاڵا" required>
                </div>
                <div class="form-group">
                    <label>جۆری کاڵا</label>
                    <select id="productCategory" required>
                        <option value="">هەڵبژاردن...</option>
                        <option value="مۆبایل">مۆبایل</option>
                        <option value="لاپتۆپ">لاپتۆپ</option>
                        <option value="کۆمپیوتەر">کۆمپیوتەر</option>
                        <option value="ئایپاد">ئایپاد</option>
                        <option value="ئوتومبێل">ئوتومبێل</option>
                        <option value="ناوماڵ">ناوماڵ</option>
                        <option value="پاسکیل">پاسکیل</option>
                        <option value="سکۆتەر">سکۆتەر</option>
                        <option value="کامێرا">کامێرا</option>
                        <option value="جوانکاری">جوانکاری</option>
                        <option value="خانوو">خانوو</option>
                        <option value="زەوی">زەوی</option>
                        <option value="باخ">باخ</option>
                        <option value="ئاژەڵ">ئاژەڵ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>وصف</label>
                    <textarea id="productDescription" placeholder="وردەکاری کاڵاکە..."></textarea>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>نرخ</label>
                        <input type="number" id="productPrice" placeholder="0" required>
                    </div>
                    <div style="flex:1;">
                        <label>دراو</label>
                        <select id="productCurrency">
                            <option value="IQD">دینار</option>
                            <option value="USD">دۆلار</option>
                            <option value="GBP">پاوەند</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>ناوی فرۆشیار</label>
                    <input type="text" id="sellerName" placeholder="ناوت" required>
                </div>
                <div class="form-group">
                    <label>ژمارەی مۆبایل</label>
                    <input type="tel" id="sellerMobile" placeholder="07xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>شوێن</label>
                    <input type="text" id="productLocation" placeholder="شار / شوێن">
                </div>
                <div class="form-group">
                    <label>وێنەکان</label>
                    <input type="file" id="productImages" accept="image/*" multiple>
                    <div id="imagePreview" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">ناردن <i class="fas fa-paper-plane"></i></button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addProductModal')">داخستن</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delivery Modal -->
    <div class="modal" id="deliveryModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('deliveryModal')"><i class="fas fa-times"></i></button>
            <div class="modal-header"><h2><i class="fas fa-shipping-fast"></i> داواکاری گەیاندن</h2></div>
            <form id="deliveryForm">
                <div class="form-group">
                    <label>ناوت</label>
                    <input type="text" id="deliveryName" placeholder="ناوی تەواو" required>
                </div>
                <div class="form-group">
                    <label>ژمارەی مۆبایل</label>
                    <input type="tel" id="deliveryMobile" placeholder="07xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>ناونیشان</label>
                    <input type="text" id="deliveryAddress" placeholder="ناونیشانی گەیاندن" required>
                </div>
                <div class="form-group">
                    <label>وردەکاری</label>
                    <textarea id="deliveryDetails" placeholder="هەر زانیاریەکی زیاتر..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">ناردن <i class="fas fa-paper-plane"></i></button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('deliveryModal')">داخستن</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
